name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: yachy-app

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (QC Gate 1)
        run: npm run lint

      - name: TypeScript check (QC Gate 2)
        run: npm run typecheck

      - name: Run tests (QC Gate 2b)
        run: npm run test

      - name: Expo dependency check (QC Gate 3)
        run: npx expo install --check

      - name: Expo export / build validation (QC Gate 4)
        run: npx expo export --platform ios

      - name: Dependency audit (QC Gate 5)
        run: npm audit --audit-level=critical
